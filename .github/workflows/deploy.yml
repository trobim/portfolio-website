name: Deploy to fabioqueiros.ch

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via FTP
        env:
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -c "
            set ftp:ssl-allow yes;
            set ftp:ssl-force no;
            set ftp:passive-mode yes;
            open -u 'fbbq@fabioqueiros.ch','$FTP_PASSWORD' ftp.fabioqueiros.ch;
            mirror --reverse --verbose --no-perms \
              --exclude-glob .git \
              --exclude-glob .versions/ \
              --exclude-glob index.zip \
              --exclude-glob CHANGELOG.md \
              --exclude-glob serve.bat \
              --exclude-glob cgi-bin/ \
              ./ /;
          "
